<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulio CS MANUAL - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 기본 레이아웃 리셋 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', sans-serif; }
        body { background-color: #f8f9fc; color: #333; }
        a { text-decoration: none; color: inherit; display: block; } /* 카드 전체를 클릭 가능하게 */

        /* ----- 상단 네비게이션 헤더 ----- */
        .top-nav {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 15px 10%;
            background-color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            color: #666;
            gap: 20px;
            position: absolute;
            width: 100%;
            top: 0;
            z-index: 10;
        }

        /* ----- 메인 히어로 배너 영역 (따뜻한 거실 배경 + 글씨 가독성 패치) ----- */
        .hero-banner {
            position: relative;
            height: 420px;
            background: linear-gradient(rgba(0, 0, 0, 0.25), rgba(0, 0, 0, 0.4)), 
                        url('https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding-left: 10%;
            padding-top: 60px;
        }

        .hero-banner h1 {
            font-size: 45px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5); 
        }

        .hero-banner p {
            font-size: 16px;
            color: #ffffff;
            font-weight: 700;
            margin-bottom: 30px;
            text-shadow: 0 1px 5px rgba(0, 0, 0, 0.6);
        }

        /* 검색창 */
        .search-container {
            position: relative;
            width: 100%;
            max-width: 480px;
        }

        .search-container input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border: none;
            border-radius: 30px;
            font-size: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            outline: none;
        }

        .search-container i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            font-size: 16px;
        }

        /* ----- 메뉴 리스트 영역 ----- */
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .menu-list { display: flex; flex-direction: column; gap: 15px; margin-bottom: 40px; }

        /* 각각의 카드 스타일 (마우스 올리면 부드럽게 반응) */
        .menu-item {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
            border: 1px solid #edf2f7;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .menu-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(92, 59, 196, 0.1);
            border-color: #5c3bc4;
        }

        .menu-header { display: flex; align-items: center; padding: 22px 25px; }

        /* 카테고리별 원형 아이콘 */
        .icon-box {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 20px;
            font-size: 18px;
            color: #fff;
            flex-shrink: 0;
        }

        .icon-cancel { background-color: #7b57df; }
        .icon-exchange { background-color: #4b89dc; }
        .icon-refund { background-color: #ff6f61; }
        .icon-price { background-color: #ffbf00; }
        .icon-product { background-color: #4bd0b1; }
        .icon-write { background-color: #ff6097; }

        .text-box { flex-grow: 1; }
        .menu-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }

        /* 각 카테고리별 글자 포인트 색상 */
        .menu-item:nth-child(1) .menu-title { color: #7b57df; }
        .menu-item:nth-child(2) .menu-title { color: #4b89dc; }
        .menu-item:nth-child(3) .menu-title { color: #ff6f61; }
        .menu-item:nth-child(4) .menu-title { color: #ffbf00; }
        .menu-item:nth-child(5) .menu-title { color: #4bd0b1; }
        .menu-item:nth-child(6) .menu-title { color: #ff6097; }

        .menu-desc { font-size: 13.5px; color: #777; }
        .arrow-icon { font-size: 16px; color: #ccc; transition: color 0.2s; }
        .menu-item:hover .arrow-icon { color: #5c3bc4; }

        /* 하단 안내 공지 */
        .info-notice { display: flex; align-items: flex-start; background-color: #f3f0ff; border-radius: 12px; padding: 20px 25px; }
        .info-notice i { font-size: 20px; color: #7b57df; margin-right: 15px; margin-top: 2px; }
        .info-notice-content h4 { font-size: 14px; font-weight: 700; color: #431fa1; margin-bottom: 4px; }
        .info-notice-content p { font-size: 12.5px; color: #666; line-height: 1.5; }

        /* 모바일 반응형 대응 */
        @media (max-width: 768px) {
            .hero-banner { padding-left: 5%; height: 350px; }
            .hero-banner h1 { font-size: 32px; }
            .hero-banner p { font-size: 14px; }
        }
    </style>
</head>
<body>

    <header class="top-nav">
        <a href="#"><i class="fa-regular fa-bell"></i> 공지사항</a>
        <a href="#"><i class="fa-solid fa-arrows-rotate"></i> 업데이트</a>
        <a href="#"><i class="fa-regular fa-star"></i> 즐겨찾기</a>
    </header>

    <section class="hero-banner">
        <h1>Pulio CS MANUAL</h1>
        <p>고객의 하루를 더 편안하게, 폴리오 CS 매뉴얼</p>
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="검색어를 입력해주세요.">
        </div>
    </section>

    <main class="container">
        <div class="menu-list">
            
            <a href="cancel.html" class="menu-item">
                <div class="menu-header">
                    <div class="icon-box icon-cancel">
                        <i class="fa-solid fa-cart-shopping"></i>
                    </div>
                    <div class="text-box">
                        <div class="menu-title">주문 취소</div>
                        <div class="menu-desc">주문 취소 가능 여부와 단계별 처리 방법을 안내합니다.</div>
                    </div>
                    <i class="fa-solid fa-chevron-right arrow-icon"></i>
                </div>
            </a>

            <a href="exchange.html" class="menu-item">
                <div class="menu-header">
                    <div class="icon-box icon-exchange">
                        <i class="fa-solid fa-arrows-rotate"></i>
                    </div>
                    <div class="text-box">
                        <div class="menu-title">교환</div>
                        <div class="menu-desc">교환 접수부터 처리, 재배송까지 모든 과정을 안내합니다.</div>
                    </div>
                    <i class="fa-solid fa-chevron-right arrow-icon"></i>
                </div>
            </a>

            <a href="refund.html" class="menu-item">
                <div class="menu-header">
                    <div class="icon-box icon-refund">
                        <i class="fa-solid fa-reply"></i>
                    </div>
                    <div class="text-box">
                        <div class="menu-title">반품</div>
                        <div class="menu-desc">반품 접수부터 회수, 환불 처리까지 모두 안내합니다.</div>
                    </div>
                    <i class="fa-solid fa-chevron-right arrow-icon"></i>
                </div>
            </a>

            <a href="price.html" class="menu-item">
                <div class="menu-header">
                    <div class="icon-box icon-price">

                    <div class="text-box">

                    </div>
                    <i class="fa-solid fa-chevron-right arrow-icon"></i>
                </div>
            </a>

            <a href="product.html" class="menu-item">
                <div class="menu-header">
                    <div class="icon-box icon-product">
                        <i class="fa-solid fa-box-open"></i>
                    </div>
                    <div class="text-box">
                        <div class="menu-title
