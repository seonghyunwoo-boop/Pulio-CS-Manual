<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>접수 기재 방법 - Pulio CS MANUAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', sans-serif; }
        body { background-color: #f8f9fc; color: #333; }
        a { text-decoration: none; color: inherit; }

        .top-nav {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 15px 10%;
            background-color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            color: #666;
            gap: 20px;
            position: absolute;
            width: 100%;
            top: 0;
            z-index: 10;
        }

        .hero-banner {
            position: relative;
            height: 420px;
            background: linear-gradient(rgba(0, 0, 0, 0.25), rgba(0, 0, 0, 0.4)), 
                        url('https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding-left: 10%;
            padding-top: 60px;
        }

        .hero-banner h1 {
            font-size: 45px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5); 
        }

        .hero-banner p {
            font-size: 16px;
            color: #ffffff;
            font-weight: 700;
            margin-bottom: 30px;
            text-shadow: 0 1px 5px rgba(0, 0, 0, 0.6);
        }

        .container { max-width: 900px; margin: -50px auto 50px auto; padding: 0 20px; position: relative; z-index: 5; }
        .detail-card { background: #fff; border-radius: 16px; padding: 40px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); border: 1px solid #edf2f7; }
        
        .back-btn { display: inline-flex; align-items: center; gap: 8px; color: #be185d; font-weight: 700; font-size: 15px; margin-bottom: 30px; }
        .title-area { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; border-bottom: 2px solid #f1f5f9; padding-bottom: 20px; }
        .icon { width: 48px; height: 48px; border-radius: 50%; background: #ff6097; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .detail-card h2 { font-size: 26px; color: #be185d; font-weight: 700; }
        
        .content { font-size: 15.5px; color: #444; line-height: 1.7; }
        .content p { margin-bottom: 15px; }
        .highlight-box { background: #fdf2f8; border-left: 4px solid #ff6097; padding: 20px; border-radius: 4px 12px 12px 4px; margin: 25px 0; }
        .highlight-box h3 { color: #831843; margin-bottom: 8px; font-weight: 700; }
    </style>
</head>
<body>

    <header class="top-nav">
        <a href="index.html"><i class="fa-solid fa-house"></i> 메인 홈</a>
        <a href="#"><i class="fa-regular fa-bell"></i> 공지사항</a>
    </header>

    <section class="hero-banner">
        <h1>Pulio CS MANUAL</h1>
        <p>고객의 하루를 더 편안하게, 폴리오 CS 매뉴얼</p>
    </section>

    <main class="container">
        <div class="detail-card">
            <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> 홈으로 돌아가기</a>
            <div class="title-area">
                <div class="icon"><i class="fa-solid fa-pen"></i></div>
                <h2>접수 양식 기재 안내</h2>
            </div>
            <div class="content">
                <p>신속한 처리를 위해 접수 등록 시 필수 데이터 누락에 유의 바랍니다.</p>
                <div class="highlight-box">
                    <h3>필수 기재 항목</h3>
                    <p><strong>1. 고객 정보:</strong> 수령인명 / 연락처 / 반송 주소</p>
                    <p><strong>2. 주문 정보:</strong> 구매처(공홈/네이버 등) / 주문코드(번호)</p>
                    <p><strong>3. 상세 사유:</strong> 상세 고장 현상 및 확인 사진/영상</p>
                </div>
                <div class="highlight-box">
                    <h3>증상 영상 확보</h3>
                    <p>• 확인이 모호한 불량 증상은 사전에 3초 이상 녹화된 영상을 전달받는 것이 조속한 판정에 큰 도움이 됩니다.</p>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
